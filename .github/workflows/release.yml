name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'SemVer bump'
        type: choice
        required: true
        default: patch
        options: [patch, minor, major]
      version:
        description: 'Explicit version (overrides bump), e.g. 1.0.0 — empty = auto'
        type: string
        required: false
        default: ''
      dry_run:
        description: 'Preview without commit/tag/release'
        type: boolean
        required: false
        default: false

permissions:
  contents: write # push commit + tag + create release via github.token

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tests:
    uses: ./.github/workflows/tests.yml # never release without green tests

  release:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Trust the workspace for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cut release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP: ${{ inputs.bump }}
          VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          args=("$BUMP")
          [ -n "$VERSION" ] && args+=(--version "$VERSION")
          [ "$DRY_RUN" = "true" ] && args+=(--dry-run)
          bash .github/bin/release.sh "${args[@]}"
